spring.application.name=scheduler
server.port=8080

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

scheduler.job-scan-packages=org.codewarrior.scheduler.jobs

scheduler.waiting.dispatcher.enabled=true
scheduler.waiting.dispatcher.fixedDelayMs=30000

scheduler.taskScheduler.poolSize=10
scheduler.taskScheduler.awaitTerminationSeconds=30

scheduler.runner.corePoolSize=4
scheduler.runner.maxPoolSize=16
scheduler.runner.queueCapacity=500
scheduler.runner.keepAliveSeconds=60
scheduler.runner.shutdownTimeoutSeconds=30

scheduler.alerts.longRunningThresholdMinutes=60
scheduler.alerts.notifyOnRetry=false
scheduler.alerts.notifyOnTimeout=false
scheduler.alerts.notifyOnFailure=false
scheduler.alerts.notifyOnLongRunning=false
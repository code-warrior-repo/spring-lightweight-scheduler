spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.h2.console.settings.trace=true
spring.datasource.name=jdbc/schedulerDS
spring.datasource.url=jdbc:h2:mem:testdb;MODE=Oracle;DATABASE_TO_LOWER=FALSE;IGNORECASE=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;INIT=CREATE SCHEMA IF NOT EXISTS SCHEDULER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:h2-db/schema-test.sql
spring.sql.init.data-locations=classpath:h2-db/data-test.sql

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.create_constraint=false


# Important: Use H2 dialect, not Oracle dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

scheduler.job-scan-packages=org.codewarrior.scheduler.jobs,org.codewarrior.scheduler.integration


spring.mail.host=AG-HVW62Z3.A70ADMED.COM
spring.mail.port=5000
spring.mail.username=
spring.mail.password=

spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.default-encoding=UTF-8

